- name: "GUI_Map_Size"
  client_type: "GUI"
  steps:
    - send: "msz\n"
    - expect: '^msz 10 10\n$'

- name: "GUI_Map_Content_MCT"
  client_type: "GUI"
  steps:
    - send: "mct\n"
    - expect: '^(bct \d+ \d+( \d+){7}\n)+$'

- name: "GUI_Team_Names_TNA"
  client_type: "GUI"
  steps:
    - send: "tna\n"
    - expect: '^(tna \w+\n)+$'

- name: "GUI_Unknown_Command_SUC"
  client_type: "GUI"
  steps:
    - send: "hello_server\n"
    - expect: '^suc\n$'

- name: "GUI_Tile_Content_BCT_Valid"
  client_type: "GUI"
  steps:
    - send: "bct 0 0\n"
    - expect: '^bct 0 0( \d+){7}\n$'

- name: "GUI_Tile_Content_BCT_Out_Of_Bounds"
  client_type: "GUI"
  steps:
    - send: "bct 9999 9999\n"
    - expect: '^sbp\n$'

- name: "GUI_Time_Get_SGT"
  client_type: "GUI"
  steps:
    - send: "sgt\n"
    - expect: '^sgt \d+\n$'

- name: "GUI_Time_Set_SST_Valid"
  client_type: "GUI"
  steps:
    - send: "sst 500\n"
    - expect: '^sst 500\n$'

- name: "GUI_Time_Set_SST_Invalid"
  client_type: "GUI"
  steps:
    - send: "sst -5\n"
    - expect: '^sbp\n$'

- name: "AI_Invalid_Command_Returns_KO"
  client_type: "AI"
  team: "team1"
  steps:
    - send: "FlyToTheMoon\n"
    - expect: '^ko\n$'

