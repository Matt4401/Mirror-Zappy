- name: "Integration_Fork_Flow"
  clients:
    - id: "gui_watcher"
      type: "GUI"
    - id: "ai_mother"
      type: "AI"
      team: "team1"
  steps:
    - client: "gui_watcher"
      expect: '^pnw #?\d+ \d+ \d+ \d+ \d+ team1\n$'
    - client: "gui_watcher"
      expect: '^pin #?\d+ \d+ \d+( \d+){7}\n$'
    - client: "gui_watcher"
      expect: '^ebo #?\d+\n$'

    - client: "ai_mother"
      send: "Fork\n"
    - client: "gui_watcher"
      expect: '^pfk #?\d+\n$'

    - client: "ai_mother"
      expect: '^ok\n$'
    - client: "gui_watcher"
      expect: '^enw #?\d+ #?\d+ \d+ \d+\n$'

