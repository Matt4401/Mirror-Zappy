- name: "Integration_Broadcast_Reception"
  clients:
    - id: "sender"
      type: "AI"
      team: "team1"
    - id: "receiver"
      type: "AI"
      team: "team2"
  steps:
    - client: "sender"
      send: "Broadcast Hello\n"
    - client: "sender"
      expect: '^ok\n$'
    - client: "receiver"
      expect: '^message \d+, Hello\n$'

- name: "Integration_Broadcast_Special_Chars"
  clients:
    - id: "sender"
      type: "AI"
      team: "team1"
    - id: "receiver"
      type: "AI"
      team: "team2"
  steps:
    - client: "sender"
      send: "Broadcast !@#$%^&*()_+\n"
    - client: "sender"
      expect: '^ok\n$'
    - client: "receiver"
      expect: '^message \d+, !@#\$%\^&\*\(\)_\+\n$'

- name: "Integration_Fork_Flow"
  clients:
    - id: "ai_mother"
      type: "AI"
      team: "team1"
    - id: "gui_watcher"
      type: "GUI"
  steps:
    - client: "ai_mother"
      send: "Fork\n"
    - client: "gui_watcher"
      expect: '^pfk \d+\n$'
    - client: "ai_mother"
      expect: '^ok\n$'
    - client: "gui_watcher"
      expect: '^enw \d+ \d+ \d+ \d+\n$'
