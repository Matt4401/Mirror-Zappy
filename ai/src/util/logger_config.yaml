version: 1
formatters:
  simple:
    format: '%(name)s - %(levelname)s - %(message)s'
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s (%(filename)s:%(lineno)d)'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  network_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ~
    maxBytes: 50000
    backupCount: 3
  command_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ~
    maxBytes: 50000
    backupCount: 3

  player_file_template:
#    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ~
    maxBytes: 100000
    backupCount: 5

loggers:
  simpleLogger:
    level: WARNING
    handlers: [ console ]
    propagate: no
  network_logger:
    level: INFO
    handlers: [ console, network_file ]
    propagate: no
  command_logger:
    level: INFO
    handlers: [ console, command_file ]
    propagate: no

  player_template:
    level: INFO
    handlers: [ console ]
    propagate: no

root:
  level: DEBUG
  handlers: [ console ]
