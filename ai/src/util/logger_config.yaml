version: 1
formatters:
  simple:
    format: '%(name)s - %(levelname)s - %(message)s'
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s (%(filename)s:%(lineno)d)'

handlers:
  console:
    class: logging.StreamHandler
    level: WARNING
    formatter: simple
    stream: ext://sys.stdout
  network_file:
    class: logging.FileHandler
    level: INFO
    formatter: detailed
    filename: ~

  other_file:
    class: ~
    level: ~
    formatter: ~
    filename: ~

loggers:
  simpleLogger:
    level: INFO
    handlers: [ file, console ]
    propagate: no
  network_logger:
    level: INFO
    handlers: [ console, network_file ]
    propagate: no

root:
  level: DEBUG
  handlers: [ console ]
