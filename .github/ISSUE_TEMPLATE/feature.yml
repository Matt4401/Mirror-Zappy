name: Feature Request
description: Propose a new feature or architectural change.
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        # New feature proposal
        
        Ensure the proposal provides all necessary information for the development team to understand and implement the feature effectively.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the description of the new feature?
      placeholder: |
        Implement a unified event loop...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Target Component
      options:
        - Server
        - AI / Client
        - GUI
        - Core / Shared
        - Build System
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: What are the specific requirements and constraints?
      value: |
        * The new feature **must** be covered by unit tests.
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation
      description: How should the feature be implemented? 
      placeholder: |
        * The class should use std::unique_ptr for ownership.
        * It needs to integrate into the main execution loop.
    validations:
      required: true
  - type: textarea
    id: code_examples
    attributes:
      label: Code examples
      description: Provide code snippets demonstrating the intended behavior.
      placeholder: |
        ```cpp
        int main(int argc, char** argv) {
            ArgParser parser{argc, argv};
            auto inputFile = parser.get<std::string_view>("input");
        }
        ```
