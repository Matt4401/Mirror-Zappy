name: Bug Report
description: Report a bug, crash, or memory leak.
labels: bug
title: "[BUG] -"
body:
  - type: markdown
    attributes:
      value: |
        [BUG]
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Server
        - AI / Client
        - GUI
        - Network Protocol
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Run server with `./server -p 4242`
        2. Connect 5 AI clients simultaneously.
        3. Trigger broadcast event.
        4. Observe segmentation fault.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected vs Actual Behavior
      placeholder: |
        Expected: All clients receive the broadcast string.
        Actual: Server crashes with a double-free error.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Debian 13, GCC 13, Debug Build
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic Logs
      description: Paste output from Valgrind, AddressSanitizer, or GDB.
      render: text
