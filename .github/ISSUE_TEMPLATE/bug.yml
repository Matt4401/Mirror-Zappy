name: New bug report
description: File a new bug report.
labels: bug
title: "[Bug] "
type: bug
body:
  - type: 'markdown'
    attributes:
      value: |
        Please fill the necessary data to write the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the description of the bug?
      placeholder: The program crashes when I try to...
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Bug type
      options:
        - Subject specification non-compliance
        - Crash
        - Unexpected behavior
        - Other
    validations:
      required: true
